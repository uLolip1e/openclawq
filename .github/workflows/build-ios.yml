name: Build iOS IPA

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Force downgrade in project.yml before generate
        run: |
          sed -i '' 's/SWIFT_VERSION: "6.2"/SWIFT_VERSION: "6.0"/g' apps/ios/project.yml || true
          sed -i '' 's/SWIFT_VERSION: "6.1"/SWIFT_VERSION: "6.0"/g' apps/ios/project.yml || true
          sed -i '' '/- target: OpenClawWatchApp/d' apps/ios/project.yml || true

      - name: Generate Xcode project
        run: |
          cd apps/ios
          xcodegen generate

      - name: Overwrite ALL Swift package manifests directly
        run: |
          # Fetch textual directly to a local path so xcodebuild doesn't complain about it either
          git clone https://github.com/gonzalezreal/textual.git apps/ios/.spm-packages/textual || true
          git clone https://github.com/steipete/ElevenLabsKit.git apps/ios/.spm-packages/ElevenLabsKit || true
          
          find apps/ios/.spm-packages -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.2.0/swift-tools-version: 6.0.0/g' {} + || true
          find apps/ios/.spm-packages -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.2/swift-tools-version: 6.0/g' {} + || true
          find apps/ios/.spm-packages -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.1.0/swift-tools-version: 6.0.0/g' {} + || true
          find apps/ios/.spm-packages -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.1/swift-tools-version: 6.0/g' {} + || true
          
          # Patch local repo manifests
          find . -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.2.0/swift-tools-version: 6.0.0/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.2/swift-tools-version: 6.0/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.1.0/swift-tools-version: 6.0.0/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.1/swift-tools-version: 6.0/g' {} + || true
          
          # Force local dependencies in OpenClawKit instead of remote
          sed -i '' 's|url: "https://github.com/steipete/ElevenLabsKit", exact: "0.1.0"|path: "../../ios/.spm-packages/ElevenLabsKit"|g' apps/shared/OpenClawKit/Package.swift || true
          sed -i '' 's|url: "https://github.com/gonzalezreal/textual", exact: "0.3.1"|path: "../../ios/.spm-packages/textual"|g' apps/shared/OpenClawKit/Package.swift || true

      - name: Resolve SPM
        run: |
          cd apps/ios
          xcodebuild -resolvePackageDependencies -project OpenClaw.xcodeproj -scheme OpenClaw -clonedSourcePackagesDirPath ./.spm-packages || true

      - name: Build unsigned archive
        run: |
          cd apps/ios
          xcodebuild clean archive \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            -clonedSourcePackagesDirPath ./.spm-packages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd apps/ios
          mkdir -p build/Payload
          cp -R build/OpenClaw.xcarchive/Products/Applications/OpenClaw.app build/Payload/
          cd build
          zip -r OpenClaw.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-iOS
          path: apps/ios/build/OpenClaw.ipa
