name: Build iOS IPA

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Вот этот шаг переключит дефолтный Xcode на самую свежую версию, где есть Swift 6.2
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install dependencies (ignoring TS errors)
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Downgrade Swift tools version
        run: |
          sed -i '' 's/swift-tools-version: 6.2/swift-tools-version: 6.0/g' Swabble/Package.swift || true
          sed -i '' 's/swift-tools-version: 6.2/swift-tools-version: 6.0/g' packages/clawdbot/Package.swift || true
          sed -i '' 's/swift-tools-version: 6.2/swift-tools-version: 6.0/g' apps/ios/project.yml || true
          find . -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.2.0/swift-tools-version: 6.0.0/g' {} + || true

      - name: Generate Xcode project
        run: |
          cd apps/ios
          xcodegen generate

      - name: Build unsigned archive
        run: |
          cd apps/ios
          xcodebuild clean archive \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd apps/ios
          mkdir -p build/Payload
          cp -R build/OpenClaw.xcarchive/Products/Applications/OpenClaw.app build/Payload/
          cd build
          zip -r OpenClaw.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-iOS
          path: apps/ios/build/OpenClaw.ipa
