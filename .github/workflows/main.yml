name: Build iOS IPA

on:
  workflow_dispatch: # Позволяет запускать сборку кнопкой руками

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Xcode project
        run: |
          cd apps/ios
          xcodegen generate

      - name: Build unsigned archive
        run: |
          cd apps/ios
          xcodebuild clean archive \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd apps/ios
          mkdir -p build/Payload
          cp -R build/OpenClaw.xcarchive/Products/Applications/OpenClaw.app build/Payload/
          cd build
          zip -r OpenClaw.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-iOS
          path: apps/ios/build/OpenClaw.ipa
